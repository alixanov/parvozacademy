# Railway config for BACKEND-ONLY service.
# Used via railwayConfigFile setting — CWD is /app (repo root).
# For full monorepo single-service deploy, use root railway.toml instead.

[build]
builder = "NIXPACKS"
buildCommand = "cd server && npm ci"

[deploy]
startCommand = "node server/server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30

[environments.production.variables]
NODE_ENV = "production"
