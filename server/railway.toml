# Railway config for BACKEND-ONLY deployment
# (used when the server/ directory is set as the Railway service root)
# For full monorepo deployment (frontend + backend), use root railway.toml instead.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30

[environments.production.variables]
NODE_ENV = "production"
