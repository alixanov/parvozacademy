# Railway config for BACKEND-ONLY service.
# Deployed via: cd server && railway up --service backend
# Build phases handled by server/nixpacks.toml (no buildCommand override needed).

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30

[environments.production.variables]
NODE_ENV = "production"
