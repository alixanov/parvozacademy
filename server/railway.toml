# Railway config for BACKEND-ONLY service.
# Deployed via: cd server && railway up --service backend
# CWD in container = /app (contents of server/ directory).

[build]
builder = "NIXPACKS"
buildCommand = "npm ci"

[deploy]
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30

[environments.production.variables]
NODE_ENV = "production"
