# Railway config for FRONTEND-ONLY service.
# Deployed via: cd client && railway up --service frontend
# Build phases handled by client/nixpacks.toml (no buildCommand override needed).
# Set VITE_API_URL and VITE_SOCKET_URL in Railway Variables for this service.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 30

[environments.production.variables]
NODE_ENV = "production"
