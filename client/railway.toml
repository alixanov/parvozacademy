# Railway config for FRONTEND-ONLY service.
# Used via railwayConfigFile setting — CWD is /app (repo root).
# Set VITE_API_URL and VITE_SOCKET_URL in Railway Variables for this service.

[build]
builder = "NIXPACKS"
buildCommand = "cd client && npm ci && npm run build"

[deploy]
startCommand = "cd client && npm start"
healthcheckPath = "/"
healthcheckTimeout = 30

[environments.production.variables]
NODE_ENV = "production"
